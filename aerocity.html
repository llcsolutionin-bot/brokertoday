<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aerocity Residency | Live Interactive Map</title>
    
    <link rel="icon" type="image/svg+xml" href="brokertoday.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass-nav { background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(10px); }
        
        .map-wrapper {
            position: relative;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            user-select: none;
            touch-action: none;
        }
        .map-image {
            width: 100%;
            height: auto;
            display: block;
            pointer-events: none;
        }
        
        .plot-marker {
            position: absolute;
            transform: translate(-50%, -50%);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: transform 0.2s, box-shadow 0.2s, background-color 0.3s;
            z-index: 10;
        }
        .plot-marker:hover {
            transform: translate(-50%, -50%) scale(1.15);
            box-shadow: 0 6px 12px rgba(0,0,0,0.4);
            z-index: 20;
        }
        .marker-available { background-color: #22c55e; color: #000; border: 2px solid #fff; }
        .marker-sold { background-color: #ef4444; color: #fff; border: 2px solid #fff; }
        
        .admin-active .map-wrapper { cursor: crosshair; }
        .admin-active .map-wrapper::after {
            content: "ADMIN MODE ACTIVE";
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(220, 38, 38, 0.9);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            pointer-events: none;
            z-index: 30;
        }
        .admin-active .plot-marker { cursor: grab; pointer-events: auto; }
        .admin-active .plot-marker:active { cursor: grabbing; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased">

    <nav class="glass-nav text-white p-4 sticky top-0 z-50 border-b border-slate-700">
        <div class="container mx-auto max-w-6xl flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-2 text-slate-300 hover:text-white transition-colors group">
                <svg class="w-5 h-5 transform group-hover:-translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                <span class="font-medium text-sm">वापस होम</span>
            </a>
            <div class="flex items-center gap-2">
                <h1 class="text-xl font-extrabold tracking-tight">Broker Today</h1>
            </div>
        </div>
    </nav>

    <header class="bg-slate-900 text-white py-10">
        <div class="container mx-auto px-4 max-w-6xl text-center">
            <h1 class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-white to-indigo-200">Aerocity Residency</h1>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8 max-w-6xl" id="app-container">
        <div class="mb-6 flex justify-between items-end">
            <div>
                <h2 class="text-2xl font-bold text-slate-800">लाइव मास्टर प्लान</h2>
                <p class="text-slate-500 text-sm mt-1" id="modeIndicator">प्लॉट की जानकारी के लिए क्लिक करें।</p>
            </div>
            <div class="flex gap-3 items-center">
                <button id="btnAdminLogin" onclick="enterAdminMode()" class="text-slate-300 hover:text-slate-500">🔒</button>
                <button id="btnAdminExit" onclick="exitAdminMode()" class="hidden bg-red-600 text-white text-xs font-bold py-1.5 px-3 rounded-full">Save & Exit</button>
            </div>
        </div>

        <div class="map-wrapper" id="mapWrapper">
            <img src="aerocity-map.jpg" alt="Aerocity Map" class="map-image" id="mapImage">
            <div id="markersContainer"></div>
        </div>
    </main>

    <script>
        const PROJECT_NAME = "Aerocity Residency";
        const ADMIN_PASSWORD = "Aero@9026";
        
        const WEBHOOK_INQUIRY = "https://llcsolution.duckdns.org/webhook/9cad05f9-5f1d-427e-8a49-11d6edc79617";
        const WEBHOOK_SAVE_PLOT = "https://llcsolution.duckdns.org/webhook/cfbc262e-f8c3-4065-ab1b-d6353c587404"; 
        const WEBHOOK_GET_PLOTS = "https://llcsolution.duckdns.org/webhook/5fd43c0e-7e1b-4d25-805c-92c867adeade";

        let isAdmin = false;
        let activePlots = []; 

        async function loadPlots() {
            try {
                const response = await fetch(WEBHOOK_GET_PLOTS);
                const liveData = await response.json();
                activePlots = Array.isArray(liveData) ? liveData : [];
            } catch (e) {
                activePlots = JSON.parse(localStorage.getItem('aerocity_live_plots') || "[]");
            }
            renderMarkers();
        }

        function saveToLocal() {
            localStorage.setItem('aerocity_live_plots', JSON.stringify(activePlots));
        }

        function renderMarkers() {
            const container = document.getElementById('markersContainer');
            container.innerHTML = ''; 
            activePlots.forEach(plot => {
                const marker = document.createElement('div');
                marker.style.left = `${plot.x}%`;
                marker.style.top = `${plot.y}%`;
                marker.className = `plot-marker ${plot.status === 'Sold' ? 'marker-sold' : 'marker-available'}`;
                marker.innerText = plot.plotNo;
                marker.onclick = (e) => { e.stopPropagation(); if(!isAdmin) openUserModal(plot); else openAdminModal(plot); };
                container.appendChild(marker);
            });
        }

        // Logic for Add/Update/Delete follows here...
        // ... (use the logic provided in the previous full code block) ...

        function enterAdminMode() {
            const pwd = prompt("Enter Admin Password:");
            if (pwd === ADMIN_PASSWORD) {
                isAdmin = true;
                document.getElementById('app-container').classList.add('admin-active');
                document.getElementById('btnAdminLogin').classList.add('hidden');
                document.getElementById('btnAdminExit').classList.remove('hidden');
            }
        }
        
        function exitAdminMode() {
            isAdmin = false;
            document.getElementById('app-container').classList.remove('admin-active');
            document.getElementById('btnAdminExit').classList.add('hidden');
            document.getElementById('btnAdminLogin').classList.remove('hidden');
        }

        window.onload = loadPlots;
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Management | Broker Today</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass-nav { background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(10px); }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #4f46e5; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased min-h-screen flex flex-col">

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="fixed inset-0 bg-white/80 backdrop-blur-sm z-[100] flex flex-col items-center justify-center transition-opacity duration-300">
        <div class="loader mb-4"></div>
        <h2 class="text-xl font-bold text-slate-800">एजेंट्स की लिस्ट लोड हो रही है...</h2>
    </div>

    <!-- Password Modal -->
    <div id="passwordModal" class="fixed inset-0 bg-slate-900/70 backdrop-blur-sm z-[80] hidden flex items-center justify-center p-4">
        <div class="bg-white p-6 rounded-xl w-full max-w-sm shadow-2xl relative">
            <button onclick="closeModal('passwordModal')" class="absolute top-4 right-4 text-slate-400 hover:text-slate-600">✖</button>
            <h3 class="font-bold text-lg mb-4">Admin Security Check</h3>
            <p class="text-xs text-slate-500 mb-4">एजेंट्स को Edit या Delete करने के लिए पासवर्ड डालें।</p>
            <input type="password" id="adminPwdInput" placeholder="Enter Password" class="w-full border p-3 rounded-lg mb-4 focus:outline-none focus:border-indigo-500">
            <button onclick="verifyPassword()" class="bg-indigo-600 text-white font-bold w-full py-3 rounded-lg hover:bg-indigo-700">Unlock Admin Mode</button>
        </div>
    </div>

    <!-- Navbar -->
    <nav class="glass-nav text-white p-4 sticky top-0 z-50">
        <div class="container mx-auto max-w-6xl flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-2 text-slate-300 hover:text-white transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                <span class="font-medium text-sm">वापस होम (Home)</span>
            </a>
            <h1 class="text-xl font-extrabold tracking-tight">Broker Today</h1>
        </div>
    </nav>

    <!-- Header & Controls -->
    <header class="bg-slate-900 text-white py-10">
        <div class="container mx-auto px-4 max-w-6xl flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <h1 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-white to-indigo-200">Our Trusted Agents</h1>
                <p class="text-indigo-200 mt-1 text-sm">Find the best property experts for your needs.</p>
            </div>
            <div>
                <button id="btnAdminLogin" onclick="openPasswordModal()" class="bg-slate-800 hover:bg-slate-700 text-white text-sm font-bold py-2 px-4 rounded-lg flex items-center gap-2 transition-colors">
                    <span>🔒 Admin Access</span>
                </button>
                <div id="adminControls" class="hidden flex gap-2">
                    <button onclick="openAgentModal()" class="bg-green-600 hover:bg-green-700 text-white text-sm font-bold py-2 px-4 rounded-lg flex items-center gap-2 transition-colors">
                        <span>➕ Add New Agent</span>
                    </button>
                    <button onclick="exitAdminMode()" class="bg-red-600 hover:bg-red-700 text-white text-sm font-bold py-2 px-4 rounded-lg flex items-center gap-2 transition-colors">
                        <span>✖ Exit Admin</span>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- Agents Grid Container -->
    <main class="container mx-auto px-4 py-8 max-w-6xl flex-grow">
        <div id="agentsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Agent Cards will be injected here via JS -->
        </div>
        
        <!-- Empty State -->
        <div id="emptyState" class="hidden text-center py-20">
            <span class="text-6xl mb-4 block">🕵️‍♂️</span>
            <h3 class="text-xl font-bold text-slate-700">कोई एजेंट नहीं मिला</h3>
            <p class="text-slate-500">अभी तक कोई एजेंट सिस्टम में नहीं जोड़ा गया है।</p>
        </div>
    </main>

    <!-- Agent Add/Edit Modal (Only accessible via Admin) -->
    <div id="agentModal" class="fixed inset-0 bg-slate-900/70 backdrop-blur-sm z-[70] hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl p-6 max-w-md w-full relative">
            <button onclick="closeModal('agentModal')" class="absolute top-4 right-4 text-slate-400 hover:text-slate-600">✖</button>
            <h3 class="text-xl font-bold text-indigo-700 mb-4" id="modalTitle">Add New Agent</h3>
            
            <form id="agentForm" class="space-y-4">
                <input type="hidden" id="agentUid">
                
                <div>
                    <label class="block text-xs font-bold text-slate-700 mb-1">Agent Full Name</label>
                    <input type="text" id="aName" required class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:border-indigo-500">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-700 mb-1">WhatsApp / Phone Number</label>
                    <input type="tel" id="aPhone" required class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:border-indigo-500">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-700 mb-1">Star Rating (1 to 5)</label>
                    <select id="aRating" class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg font-bold">
                        <option value="5">⭐⭐⭐⭐⭐ (5 Stars)</option>
                        <option value="4">⭐⭐⭐⭐ (4 Stars)</option>
                        <option value="3">⭐⭐⭐ (3 Stars)</option>
                        <option value="2">⭐⭐ (2 Stars)</option>
                        <option value="1">⭐ (1 Star)</option>
                    </select>
                </div>
                
                <div class="flex gap-3 mt-6">
                    <button type="submit" class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-lg transition-colors">
                        Save Agent Data
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Logic & Architecture -->
    <script>
        const ADMIN_PASSWORD = "Agent@9026";
        
        // Provided Webhooks
        const WEBHOOK_GET_AGENTS = "https://llcsolution.duckdns.org/webhook/5fd43c0e-7e1b-4d25-805c-92c867adeade";
        const WEBHOOK_SAVE_AGENT = "https://llcsolution.duckdns.org/webhook/cfbc262e-f8c3-4065-ab1b-d6353c587404"; 
        
        let isAdmin = false;
        let agentsList = [];

        async function loadAgents() {
            const overlay = document.getElementById('loadingOverlay');
            overlay.classList.remove('hidden'); 
            
            try {
                const cacheBuster = new Date().getTime();
                const response = await fetch(`${WEBHOOK_GET_AGENTS}?t=${cacheBuster}`, {
                    method: 'GET',
                    headers: { 'Cache-Control': 'no-cache', 'Pragma': 'no-cache' }
                });
                
                const jsonRes = await response.json();
                
                // Parse n8n response safely
                if (Array.isArray(jsonRes) && jsonRes.length > 0 && jsonRes[0].myField) {
                    agentsList = jsonRes[0].myField;
                } else if (jsonRes.myField) {
                    agentsList = jsonRes.myField;
                } else if (Array.isArray(jsonRes)) {
                    agentsList = jsonRes;
                } else {
                    agentsList = [];
                }

                localStorage.setItem('broker_agents', JSON.stringify(agentsList));

            } catch (error) {
                console.warn("Offline Fallback: Fetching from Local Storage", error);
                const savedLocal = localStorage.getItem('broker_agents');
                if(savedLocal) agentsList = JSON.parse(savedLocal);
            } finally {
                overlay.style.opacity = '0';
                setTimeout(() => overlay.classList.add('hidden'), 300);
                renderAgents();
            }
        }

        // Generate Star Icons based on rating
        function getStars(rating) {
            let starsHtml = '';
            for(let i=0; i<5; i++) {
                if(i < rating) {
                    starsHtml += `<svg class="w-5 h-5 text-yellow-400 inline" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"></path></svg>`;
                } else {
                    starsHtml += `<svg class="w-5 h-5 text-slate-300 inline" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"></path></svg>`;
                }
            }
            return starsHtml;
        }

        function renderAgents() {
            const grid = document.getElementById('agentsGrid');
            const emptyState = document.getElementById('emptyState');
            
            grid.innerHTML = '';

            if (agentsList.length === 0) {
                emptyState.classList.remove('hidden');
                grid.classList.add('hidden');
                return;
            }

            emptyState.classList.add('hidden');
            grid.classList.remove('hidden');

            agentsList.forEach(agent => {
                // If not admin, do not show phone number
                const phoneHtml = isAdmin 
                    ? `<div class="mt-3 text-sm text-slate-600 bg-slate-100 p-2 rounded flex items-center gap-2"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path></svg> <b>${agent.phone}</b></div>` 
                    : ``;

                // Admin Controls (Edit/Delete)
                const controlsHtml = isAdmin
                    ? `<div class="mt-4 flex gap-2 border-t pt-4">
                        <button onclick='openAgentModal(${JSON.stringify(agent)})' class="flex-1 bg-indigo-50 hover:bg-indigo-100 text-indigo-700 text-sm font-bold py-2 rounded transition-colors">Edit</button>
                        <button onclick="deleteAgent('${agent.uid}')" class="flex-1 bg-red-50 hover:bg-red-100 text-red-600 text-sm font-bold py-2 rounded transition-colors">Delete</button>
                       </div>`
                    : ``;

                const card = document.createElement('div');
                card.className = "bg-white rounded-2xl shadow-lg border border-slate-100 p-6 hover:shadow-xl transition-shadow";
                card.innerHTML = `
                    <div class="flex items-center gap-4 mb-2">
                        <div class="w-12 h-12 rounded-full bg-indigo-100 text-indigo-600 flex items-center justify-center text-xl font-black">
                            ${agent.name.charAt(0).toUpperCase()}
                        </div>
                        <div>
                            <h3 class="font-bold text-lg text-slate-800 leading-tight">${agent.name}</h3>
                            <div class="text-xs text-slate-500">Real Estate Expert</div>
                        </div>
                    </div>
                    <div class="mb-2">
                        ${getStars(parseInt(agent.rating || 5))}
                    </div>
                    ${phoneHtml}
                    ${controlsHtml}
                `;
                grid.appendChild(card);
            });
        }

        // --- Authentication Logic ---
        function openPasswordModal() {
            document.getElementById('adminPwdInput').value = '';
            document.getElementById('passwordModal').classList.remove('hidden');
        }

        function verifyPassword() {
            const pwd = document.getElementById('adminPwdInput').value;
            if (pwd === ADMIN_PASSWORD) {
                isAdmin = true;
                document.getElementById('btnAdminLogin').classList.add('hidden');
                document.getElementById('adminControls').classList.remove('hidden');
                closeModal('passwordModal');
                renderAgents(); // Re-render to show hidden phone numbers & buttons
            } else {
                alert("पासवर्ड गलत है! (Incorrect Password)");
            }
        }

        function exitAdminMode() {
            isAdmin = false;
            document.getElementById('adminControls').classList.add('hidden');
            document.getElementById('btnAdminLogin').classList.remove('hidden');
            renderAgents(); // Re-render to hide phone numbers & buttons
        }

        // --- Form Modal & Submit Logic ---
        function openAgentModal(agent = null) {
            const form = document.getElementById('agentForm');
            form.reset();
            
            if (agent) {
                document.getElementById('modalTitle').innerText = "Edit Agent Details";
                document.getElementById('agentUid').value = agent.uid;
                document.getElementById('aName').value = agent.name;
                document.getElementById('aPhone').value = agent.phone;
                document.getElementById('aRating').value = agent.rating || "5";
            } else {
                document.getElementById('modalTitle').innerText = "Add New Agent";
                document.getElementById('agentUid').value = "";
            }
            
            document.getElementById('agentModal').classList.remove('hidden');
        }

        document.getElementById('agentForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = this.querySelector('button[type="submit"]');
            btn.innerText = "Saving...";

            const uid = document.getElementById('agentUid').value || `ag_${new Date().getTime()}`;
            
            const newAgentData = {
                uid: uid,
                name: document.getElementById('aName').value,
                phone: document.getElementById('aPhone').value,
                rating: document.getElementById('aRating').value,
                action: 'save'
            };

            // Update Local State
            const existingIndex = agentsList.findIndex(a => a.uid === uid);
            if(existingIndex >= 0) {
                agentsList[existingIndex] = newAgentData;
            } else {
                agentsList.push(newAgentData);
            }
            
            localStorage.setItem('broker_agents', JSON.stringify(agentsList));
            renderAgents();
            
            // Send to n8n Webhook
            try {
                await fetch(WEBHOOK_SAVE_AGENT, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(newAgentData)
                });
            } catch(error) {
                console.error("Failed to sync to database", error);
            }
            
            closeModal('agentModal');
            btn.innerText = "Save Agent Data";
        });

        // --- Delete Logic ---
        async function deleteAgent(uid) {
            if(!confirm(`क्या आप वाकई इस एजेंट को लिस्ट से हटाना चाहते हैं?`)) return;

            // Remove Locally
            agentsList = agentsList.filter(a => a.uid !== uid);
            localStorage.setItem('broker_agents', JSON.stringify(agentsList));
            renderAgents();

            // Notify n8n Webhook
            try {
                await fetch(WEBHOOK_SAVE_AGENT, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ uid: uid, action: 'delete' })
                });
            } catch(error) {
                console.error("Failed to delete from database", error);
            }
        }

        function closeModal(id) {
            document.getElementById(id).classList.add('hidden');
        }

        // Initialize on load
        window.onload = loadAgents;
    </script>
</body>
</html>
